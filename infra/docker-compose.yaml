services:
  postgres:
    image: postgres:16
    container_name: wanda_postgres
    restart: unless-stopped

    env_file:
      - .env.docker

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - wanda_pg_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wanda_pg_data: