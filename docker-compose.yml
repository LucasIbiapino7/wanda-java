services:
  wanda-java:
    image: wanda-java
    container_name: wanda-java
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8088:8080"
    environment:
      - DB_URL=${DB_URL}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - PYTHON_BASE_URL=${PYTHON_BASE_URL}
      - OTEL_ENDPOINT=${OTEL_ENDPOINT}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - wanda-network

networks:
  wanda-network:
    external: true